<!DOCTYPE html>
<html>
<head>
  <title>Recipients</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Add Recipient</h2>

<form id="recipientForm">

  <label>Name</label>
  <input type="text" id="name" required>

  <label>Email</label>
  <input type="email" id="email" required>

  <label>Status</label>
  <select id="status">
    <option value="SUBSCRIBED">Subscribed</option>
    <option value="UNSUBSCRIBED">Unsubscribed</option>
  </select>

  <button type="submit">Add Recipient</button>

</form>

<hr>

<h2>Upload Recipients (Excel)</h2>

<form id="uploadForm">

  <input type="file" id="file" required>

  <button type="submit">Upload</button>

</form>

<script>

document.getElementById("recipientForm").addEventListener("submit", function(e){

e.preventDefault();

const recipient = {

name: document.getElementById("name").value,
email: document.getElementById("email").value,
subscriptionStatus: document.getElementById("status").value

};

fetch("/api/recipients", {

method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify(recipient)

})
.then(res => res.json())
.then(data => alert("Recipient added"));

});


// EXCEL UPLOAD
document.getElementById("uploadForm").addEventListener("submit", function(e){

e.preventDefault();

let formData = new FormData();
formData.append("file", document.getElementById("file").files[0]);

fetch("/api/recipients/excel-upload", {

method: "POST",
body: formData

})
.then(res => res.text())
.then(data => alert("Upload successful"));

});

</script>

</body>
</html>
