<!DOCTYPE html>
<html>
<head>
    <title>Email Campaign System</title>

    <style>

body{
font-family: Arial, sans-serif;
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#4facfe,#00f2fe);
}

.main-container{
text-align:center;
color:white;
}

h1{
margin-bottom:40px;
font-size:36px;
}

.container{
display:grid;
grid-template-columns: repeat(2, 220px);
gap:20px;
justify-content:center;
}

.card{
background:white;
color:#333;
padding:30px;
border-radius:10px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
transition: transform 0.2s, box-shadow 0.2s;
cursor:pointer;
text-decoration:none;
font-weight:bold;
font-size:18px;
display:flex;
align-items:center;
justify-content:center;
}

.card:hover{
transform: translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="main-container">

    <h1>Email Campaign Management</h1>

    <div class="container">

        <a class="card" href="campaign.html">
            Create Campaign
        </a>

        <a class="card" href="recipients.html">
            Recipients
        </a>

        <a class="card" href="dashboard.html">
            Dashboard
        </a>

        <a class="card" href="execute.html">
            Execute Campaign
        </a>

    </div>

</div>

</body>
</html>
